version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: monthly

    groups:
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"

      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"

      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
