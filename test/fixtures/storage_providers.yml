acme_filesystem:
  tenant: acme
  name: Primary
  adapter_type: filesystem
  configuration:
    storage_path: "tmp/test_storage/acme"
  active: true

globex_s3:
  tenant: globex
  name: Secondary
  adapter_type: s3
  configuration:
    bucket: test-s3-bucket
    endpoint: http://localhost:9000
    access_key_id: minio
    secret_access_key: minio123456
    force_path_style: true
    region: us-east-1
  active: true

cyberdyne_database:
  tenant: cyberdyne
  name: Database Storage
  adapter_type: database
  configuration: {}
  active: true

uplink_ftp:
  tenant: uplink
  name: FTP Storage
  adapter_type: ftp
  configuration:
    host: localhost
    port: 21
    username: ftpuser
    password: ftppassword
    root_path: /test/uplink
  active: true
