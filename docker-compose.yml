version: '3.1'

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    networks:
    - default
    volumes:
    - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        PGDATA: /var/lib/postgresql/data/simple-drive-app

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 5

  create-buckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minio minio123456;
      /usr/bin/mc mb --ignore-existing myminio/globex;
      /usr/bin/mc mb --ignore-existing myminio/test-s3-bucket;
      exit 0;
      "

  ftp:
    image: fauria/vsftpd
    restart: unless-stopped
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - ftp-data:/home/vsftpd
    environment:
      FTP_USER: ftpuser
      FTP_PASS: ftppassword
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110

  app:
    image: anykey007/simple_drive:1.0.0
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - postgres
      - minio
      - ftp
    environment:
      RAILS_ENV: development
    volumes:
      - .:/rails
    extra_hosts:
      - "localhost:host-gateway"

volumes:
  postgres-data:
  minio-data:
  ftp-data:
